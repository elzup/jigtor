name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install package runner
        run: npm install -g @antfu/ni

      - name: Install dependencies
        run: ni --frozen

      - name: Build
        run: nr build

      - name: Package release asset
        env:
          RELEASE_NAME: jigtor-${{ github.ref_name }}
        run: |
          mkdir -p "release/${RELEASE_NAME}"
          cp -R dist/. "release/${RELEASE_NAME}/"
          cat > "release/${RELEASE_NAME}/README.txt" <<'EOF'
          jigtor

          Primary app:
          https://elzup.github.io/jigtor/

          Direct in-place saving uses the browser File System Access API and
          requires the hosted HTTPS app in a Chromium-based browser.
          EOF
          (cd release && zip -qr "${RELEASE_NAME}.zip" "${RELEASE_NAME}")

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" \
            "release/jigtor-${TAG_NAME}.zip" \
            --title "jigtor ${TAG_NAME}" \
            --notes "Use the hosted app at https://elzup.github.io/jigtor/ for direct config.json saving. The zip is a static fallback artifact."
