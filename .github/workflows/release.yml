name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  web:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install package runner
        run: npm install -g @antfu/ni

      - name: Install dependencies
        run: ni --frozen

      - name: Build
        run: nr build

      - name: Package release asset
        env:
          RELEASE_NAME: jigtor-${{ github.ref_name }}
        run: |
          mkdir -p "release/${RELEASE_NAME}"
          cp -R dist/. "release/${RELEASE_NAME}/"
          cat > "release/${RELEASE_NAME}/README.txt" <<'EOF'
          jigtor

          Primary app:
          https://elzup.github.io/jigtor/

          Direct in-place saving uses the browser File System Access API and
          requires the hosted HTTPS app in a Chromium-based browser.
          EOF
          (cd release && zip -qr "${RELEASE_NAME}.zip" "${RELEASE_NAME}")

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" \
            "release/jigtor-${TAG_NAME}.zip" \
            --title "jigtor ${TAG_NAME}" \
            --notes "Hosted app (Chromium, direct save): https://elzup.github.io/jigtor/ · Offline desktop builds (macOS/Windows/Linux) are attached below."

  # Native Tauri desktop builds, uploaded to the release created by `web` above.
  # Same frontend bundle as the hosted app — the OS webview replaces the browser,
  # and file IO is served by Rust (src-tauri) instead of the File System Access API.
  desktop:
    needs: web
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ contains(matrix.platform, 'macos') && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install package runner
        run: npm install -g @antfu/ni

      - name: Install dependencies
        run: ni --frozen

      - name: Build and upload desktop app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          # Invoke the local CLI via npx so the Windows runner resolves it —
          # `npm run tauri` (the default) runs the bare `tauri` script, which is
          # not on PATH there ("'tauri' is not recognized").
          tauriScript: npx tauri
          tagName: ${{ github.ref_name }}
          releaseName: "jigtor ${{ github.ref_name }}"
          args: ${{ matrix.args }}
