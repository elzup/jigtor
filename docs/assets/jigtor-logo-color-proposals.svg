<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">jigtor app icon color proposals</title>
  <desc id="desc">Four color variants of the existing C-clamp and JSON document app icon.</desc>
  <rect width="1200" height="420" fill="#f7f8fa"/>

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>

  <text x="48" y="54" fill="#1a1d23" font-family="system-ui, sans-serif" font-size="26" font-weight="700">jigtor — app icon color proposals</text>
  <text x="48" y="82" fill="#6b7280" font-family="system-ui, sans-serif" font-size="15">Same C-clamp + JSON mark, color only</text>

  <!-- A: UI-aligned cobalt -->
  <g transform="translate(48 112)">
    <rect width="252" height="260" rx="20" fill="#ffffff" filter="url(#shadow)"/>
    <g transform="translate(46 22) scale(.625)">
      <rect width="256" height="256" rx="52" fill="#2563eb"/>
      <rect x="92" y="52" width="112" height="152" rx="12" fill="#ffffff"/>
      <rect x="112" y="80" width="56" height="10" rx="3" fill="#64748b"/>
      <rect x="112" y="104" width="72" height="10" rx="3" fill="#cbd5e1"/>
      <rect x="112" y="128" width="48" height="10" rx="3" fill="#cbd5e1"/>
      <rect x="112" y="152" width="64" height="10" rx="3" fill="#cbd5e1"/>
      <path d="M92 62H62V194H92V172H78V84H92Z" fill="#172554"/>
      <rect x="40" y="121" width="34" height="14" rx="4" fill="#172554"/>
      <circle cx="40" cy="128" r="15" fill="#93c5fd"/>
    </g>
    <text x="20" y="211" fill="#1a1d23" font-family="system-ui, sans-serif" font-size="17" font-weight="700">A · Cohesive Cobalt</text>
    <text x="20" y="234" fill="#6b7280" font-family="system-ui, sans-serif" font-size="13">UI-aligned · recommended</text>
    <circle cx="178" cy="229" r="7" fill="#2563eb"/><circle cx="198" cy="229" r="7" fill="#172554"/><circle cx="218" cy="229" r="7" fill="#93c5fd"/>
  </g>

  <!-- B: product-oriented indigo + mint -->
  <g transform="translate(332 112)">
    <rect width="252" height="260" rx="20" fill="#ffffff" filter="url(#shadow)"/>
    <g transform="translate(46 22) scale(.625)">
      <rect width="256" height="256" rx="52" fill="#4f46e5"/>
      <rect x="92" y="52" width="112" height="152" rx="12" fill="#ffffff"/>
      <rect x="112" y="80" width="56" height="10" rx="3" fill="#64748b"/>
      <rect x="112" y="104" width="72" height="10" rx="3" fill="#cbd5e1"/>
      <rect x="112" y="128" width="48" height="10" rx="3" fill="#cbd5e1"/>
      <rect x="112" y="152" width="64" height="10" rx="3" fill="#cbd5e1"/>
      <path d="M92 62H62V194H92V172H78V84H92Z" fill="#1e1b4b"/>
      <rect x="40" y="121" width="34" height="14" rx="4" fill="#1e1b4b"/>
      <circle cx="40" cy="128" r="15" fill="#2dd4bf"/>
    </g>
    <text x="20" y="211" fill="#1a1d23" font-family="system-ui, sans-serif" font-size="17" font-weight="700">B · Indigo Mint</text>
    <text x="20" y="234" fill="#6b7280" font-family="system-ui, sans-serif" font-size="13">friendly · modern product</text>
    <circle cx="178" cy="229" r="7" fill="#4f46e5"/><circle cx="198" cy="229" r="7" fill="#1e1b4b"/><circle cx="218" cy="229" r="7" fill="#2dd4bf"/>
  </g>

  <!-- C: tool-like teal + warm handle -->
  <g transform="translate(616 112)">
    <rect width="252" height="260" rx="20" fill="#ffffff" filter="url(#shadow)"/>
    <g transform="translate(46 22) scale(.625)">
      <rect width="256" height="256" rx="52" fill="#0f766e"/>
      <rect x="92" y="52" width="112" height="152" rx="12" fill="#f8fafc"/>
      <rect x="112" y="80" width="56" height="10" rx="3" fill="#64748b"/>
      <rect x="112" y="104" width="72" height="10" rx="3" fill="#cbd5e1"/>
      <rect x="112" y="128" width="48" height="10" rx="3" fill="#cbd5e1"/>
      <rect x="112" y="152" width="64" height="10" rx="3" fill="#cbd5e1"/>
      <path d="M92 62H62V194H92V172H78V84H92Z" fill="#042f2e"/>
      <rect x="40" y="121" width="34" height="14" rx="4" fill="#042f2e"/>
      <circle cx="40" cy="128" r="15" fill="#fde68a"/>
    </g>
    <text x="20" y="211" fill="#1a1d23" font-family="system-ui, sans-serif" font-size="17" font-weight="700">C · Workshop Teal</text>
    <text x="20" y="234" fill="#6b7280" font-family="system-ui, sans-serif" font-size="13">local tool · warm detail</text>
    <circle cx="178" cy="229" r="7" fill="#0f766e"/><circle cx="198" cy="229" r="7" fill="#042f2e"/><circle cx="218" cy="229" r="7" fill="#fde68a"/>
  </g>

  <!-- D: dark developer-tool palette -->
  <g transform="translate(900 112)">
    <rect width="252" height="260" rx="20" fill="#ffffff" filter="url(#shadow)"/>
    <g transform="translate(46 22) scale(.625)">
      <rect width="256" height="256" rx="52" fill="#111827"/>
      <rect x="92" y="52" width="112" height="152" rx="12" fill="#f8fafc"/>
      <rect x="112" y="80" width="56" height="10" rx="3" fill="#64748b"/>
      <rect x="112" y="104" width="72" height="10" rx="3" fill="#cbd5e1"/>
      <rect x="112" y="128" width="48" height="10" rx="3" fill="#cbd5e1"/>
      <rect x="112" y="152" width="64" height="10" rx="3" fill="#cbd5e1"/>
      <path d="M92 62H62V194H92V172H78V84H92Z" fill="#60a5fa"/>
      <rect x="40" y="121" width="34" height="14" rx="4" fill="#60a5fa"/>
      <circle cx="40" cy="128" r="15" fill="#a78bfa"/>
    </g>
    <text x="20" y="211" fill="#1a1d23" font-family="system-ui, sans-serif" font-size="17" font-weight="700">D · Graphite Neon</text>
    <text x="20" y="234" fill="#6b7280" font-family="system-ui, sans-serif" font-size="13">developer tool · dark</text>
    <circle cx="178" cy="229" r="7" fill="#111827"/><circle cx="198" cy="229" r="7" fill="#60a5fa"/><circle cx="218" cy="229" r="7" fill="#a78bfa"/>
  </g>
</svg>
